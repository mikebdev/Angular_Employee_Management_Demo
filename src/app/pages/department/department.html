
<div class="container-fluid px-4 py-4">
    <!-- Page Header -->
    <div class="mb-4">
        <h3 class="fs-4 fw-semibold text-dark">
            <i class="fas fa-building me-2 text-primary"></i>Department Management
        </h3>
        <p class="text-muted mb-0">Create, update, and manage corporate departments.</p>
    </div>

    <!-- Form Section -->
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <form>
                <div class="row g-3 align-items-center">
                    <!-- Textbox (col-md-3) -->
                    <div class="col-12 col-md-3">
                        <label for="departmentName" class="form-label fw-medium text-secondary">Department Name</label>
                        <input type="text" [(ngModel)]="newDeptObj.departmentName" name="departmentName" id="departmentName" class="form-control" placeholder="e.g., Human Resources">
                    </div>

                    <!-- Checkbox (col-md-2) -->
                    <div class="col-12 col-md-2 d-md-flex align-items-end h-100 mt-md-4 pt-md-2">
                        <div class="form-check form-switch py-2">
                            <input [(ngModel)]="newDeptObj.isActive" name="isActive" class="form-check-input" type="checkbox" id="isActive" checked>
                            <label class="form-check-label fw-medium text-secondary" for="isActive">Is Active</label>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="col-12 col-md-4 d-md-flex align-items-end h-100 mt-md-4 pt-md-2">
                        @if(newDeptObj.departmentId == 0) {
                        <button (click)="onSaveDepartment()" class="btn btn-primary me-2">
                            <i class="fas fa-save me-2"></i>Save
                        </button>
                        }
                        @else {
                        <button (click)="onUpdateDepartment()" class="btn btn-warning me-2">
                            <i class="fas fa-save me-2"></i>Update
                        </button>
                        }

                        <button (click)="onResetForm()" class="btn btn-outline-secondary">
                            <i class="fas fa-undo me-2"></i>Reset
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Data Table Section -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white border-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
            <h5 class="card-title fw-semibold m-0">Department Records</h5>
            <span class="badge bg-secondary px-3 py-2 rounded-pill">Total: 3</span>
        </div>
        <div class="card-body p-0 mt-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light border-bottom text-secondary">
                        <tr>
                            <th scope="col" class="ps-4" style="width: 10%">#</th>
                            <th scope="col" style="width: 50%">Department Name</th>
                            <th scope="col" style="width: 20%">Status</th>
                            <th scope="col" class="pe-4 text-end" style="width: 20%">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        

                        @for (item of departmentList(); track $index) {
                            <tr>
                                <td class="ps-4 fw-medium text-muted">{{ $index + 1 }}</td>
                                <td class="fw-semibold">{{ item.departmentName }}</td>
                                <td>
                                    <span *ngIf="item.isActive" class="badge bg-success-subtle text-success border border-success-subtle px-2 py-1 rounded">
                                        <i class="fas fa-circle-check me-1"></i>Active
                                    </span>
                                    <span *ngIf="!item.isActive" class="badge bg-danger-subtle text-danger border border-danger-subtle px-2 py-1 rounded">
                                        <i class="fas fa-circle-xmark me-1"></i>Inactive
                                    </span>
                                </td>
                                <td class="pe-4 text-end">
                                    <button type="button" class="btn btn-sm btn-outline-primary me-1" title="Edit" (click)="onEditDepartment(item)">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button type="button" class="btn btn-sm btn-outline-danger" title="Delete" (click)="onDeleteDepartment(item.departmentId)">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        }
