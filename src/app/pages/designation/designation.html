<div class="container mt-4">

    <!-- Form Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            Designation Management
        </div>

        <div class="card-body">
            <form [formGroup]="designationForm">

                <div class="row align-items-end g-3">

                    <!-- Department -->
                    <div class="col-md-3">
                        <label class="form-label">Department</label>
                        <select formControlName="departmentId" class="form-select">
                            <option selected value="0">-- Select Department --</option> <!-- check to make sure it isn't selected as an option on submit-->
                            @for (item of departmentList; track $index) {
                                <option [value]="item.departmentId">{{ item.departmentName }}</option>
                            }
                        </select>
                    </div>

                    <!-- Designation -->
                    <div class="col-md-3">
                        <label class="form-label">Designation Name</label>
                        <input type="text" formControlName="designationName" class="form-control" placeholder="Enter Designation">
                    </div>

                    <!-- Active -->
                    <!-- <div class="col-md-2">
                        <label class="form-label d-block">Status</label>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" checked>

                            <label class="form-check-label">
                                Is Active
                            </label>
                        </div>
                    </div> -->

                    <!-- Save -->
                    <div class="col-md-2 d-grid">
                    @if (!isEditMode) {
                        <button (click)="onSaveDesignation()" class="btn btn-success">
                            Save
                        </button>
                    }
                    @else {
                        <button (click)="onSaveDesignation()" class="btn btn-warning">
                            Update
                        </button>
                    }
                    </div>

                    <!-- Reset -->
                    <div class="col-md-2 d-grid">
                        <button (click)="ResetForm()" class="btn btn-secondary">
                            Reset
                        </button>
                    </div>

                </div>

            </form>

        </div>
    </div>

    <!-- Table Card -->
    <div class="card shadow-sm">

        <div class="card-header bg-dark text-white">
            Designation List
        </div>

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle">

                    <thead>
                        <tr>
                            <th style="width:70px;">#</th>
                            <th>Department</th>
                            <th>Designation</th>
                            <!-- <th style="width:120px;">Status</th> -->
                            <th style="width:160px;">Action</th>
                        </tr>
                    </thead>

                    <tbody>


                        @for (item of $designationList | async; track $index) { 
                            <tr>
                                <td>{{ $index + 1 }}</td>
                                <td>{{ item.departmentName }}</td>
                                <td>{{ item.designationName }}</td>
                                <!-- <td>
                                    <span class="badge" [ngClass]="item.isActive ? 'bg-success' : 'bg-secondary'">
                                        {{ item.isActive ? 'Active' : 'Inactive' }}
                                    </span>
                                </td> -->
                                <td>
                                    <button (click)="onEditDesignation(item)" class="btn btn-sm btn-primary">Edit</button>
                                    <button (click)="onDeleteDesignation(item.designationId)" class="btn btn-sm btn-danger">Delete</button>
                                </td>
                            </tr>
                        }


                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>
