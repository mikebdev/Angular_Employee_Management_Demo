<div class="d-flex" [ngClass]="{'collapsed': isCollapsed}" id="wrapper">
    <!-- Sidebar Wrapper -->
    <div class="bg-dark text-white border-end" id="sidebar-wrapper">
        <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom">
            <i class="fas fa-user-shield me-2"></i>
            <span class="nav-text">AdminPanel</span>
        </div>

        <div class="list-group list-group-flush my-3">
            <a routerLink="/dashboard" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-tachometer-alt me-3 fs-5"></i>
                <span class="nav-text">Dashboard</span>
            </a>
            <a routerLink="/users" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-users me-3 fs-5"></i>
                <span class="nav-text">Employees</span>
            </a>
            <a routerLink="/analytics" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-chart-line me-3 fs-5"></i>
                <span class="nav-text">Departments</span>
            </a>
            <a routerLink="/settings" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-cog me-3 fs-5"></i>
                <span class="nav-text">Designations</span>
            </a>
            <a routerLink="/settings" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-cog me-3 fs-5"></i>
                <span class="nav-text">Reports</span>
            </a>
            <a routerLink="/settings" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-cog me-3 fs-5"></i>
                <span class="nav-text">Settings</span>
            </a>
            <a routerLink="/settings" routerLinkActive="active"
                class="list-group-item list-group-item-action bg-transparent text-white border-0 py-3 px-4">
                <i class="fas fa-cog me-3 fs-5"></i>
                <span class="nav-text">Logout</span>
            </a>
        </div>
    </div>

    <!-- Page Content Wrapper -->
    <div id="page-content-wrapper" class="w-100">
        <!-- Navbar / Header with Toggle Button -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light py-3 px-4 border-bottom">
            <div class="d-flex align-items-center">
                <button class="btn btn-dark" id="menu-toggle" (click)="toggleSidebar()">
                    <i class="fas" [ngClass]="isCollapsed ? 'fa-align-left' : 'fa-align-justify'"></i>
                </button>
                <h3 class="fs-4 m-0 ms-3">Dashboard Home</h3>
            </div>
        </nav>

        <!-- Main Dynamic Content -->
        <div class="container-fluid px-4 py-4">
            <router-outlet></router-outlet>
            <div class="card p-4">
                <h5>Welcome to the Dashboard Core Workspace</h5>
                <p>Main dynamic contents render here smoothly without structural flashing.</p>
            </div>
        </div>
    </div>
</div>
